# .github/workflows/veille.yml
# Exécute le collecteur chaque matin (06:15 heure de Paris) et publie veille.json.
# Zéro serveur à maintenir, gratuit pour un dépôt public.

name: Veille CHRONOS

on:
  schedule:
    - cron: "15 5 * * *"   # 05:15 UTC = 06:15 Paris (hiver) / 07:15 (été)
  workflow_dispatch: {}     # permet aussi de lancer à la main depuis l'onglet Actions

permissions:
  contents: write            # autorise le commit du fichier généré

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer veille.json
        run: node veille.mjs

      - name: Publier si modifié
        run: |
          git config user.name  "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add veille.json
          if git diff --staged --quiet; then
            echo "Aucun changement aujourd'hui."
          else
            git commit -m "Veille — $(date -u +%Y-%m-%d)"
            git push
          fi
